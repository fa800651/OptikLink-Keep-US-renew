name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '59 1 * * *'  # ✅ 每天执行
  workflow_dispatch:

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      # ✅ 核心：控制“5月8日 + 每3天”
      - name: ⏳ 判断是否执行
        id: check_date
        run: |
          START="2026-05-08"
          TODAY=$(date +%Y-%m-%d)

          echo "📅 今天: $TODAY | 起始: $START"

          start_ts=$(date -d "$START" +%s)
          today_ts=$(date -d "$TODAY" +%s)

          diff_days=$(( (today_ts - start_ts) / 86400 ))

          if [ $diff_days -lt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⛔ 未到开始日期"
          elif [ $((diff_days % 3)) -ne 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ 今天不在执行周期（每3天）"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ 命中执行日"
          fi

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' && steps.check_date.outputs.skip != 'true' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      - name: 🚀 运行保活脚本
        if: ${{ steps.check_date.outputs.skip != 'true' }}
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT:   ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test

      - name: 📸 上传失败截图
        if: ${{ failure() && steps.check_date.outputs.skip != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7
